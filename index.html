<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Project</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>

        <!-- ✅ Bootstrap navbar -->
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">

                <!-- Brand/Logo -->
                <a class="navbar-brand text-white fw-bold" href="#home">AR</a>

                <!-- ✅ Bootstrap hamburger — works out of the box -->
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navMenu"
                    aria-controls="navMenu"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                    <i class="fa-solid fa-bars text-white"></i>
                </button>

                <!-- ✅ Collapsible menu -->
                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link text-white" href="#home">Home</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#about">About</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#skills">Skills</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#experience">Experience</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#education">Education</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#portfolio">Portfolio</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="#contact">Contact</a></li>
                    </ul>
                </div>

            </div>
        </nav>

        <!-- Hero content -->
        <div class="hero-content">
            <div class="profile-pic"></div>
            <div class="my-name">
                <h2>Abhishek Roy</h2>
            </div>
            <div class="socials">
                <a href="#google"><i class="fa-brands fa-google"></i></a>
                <a href="#facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="#linkedin"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#github"><i class="fa-brands fa-github"></i></a>
            </div>
        </div>

    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
